name: Build APK

on:
  push:
    branches: [ '**' ]
    paths:
      - 'android/BansosService/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Android SDK (manual)
        run: |
          # GitHub runner already has Android SDK, just accept licenses and install required packages
          ANDROID_HOME="/usr/local/lib/android/sdk"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "SDK ready: $ANDROID_HOME"
      
      - name: Build APK
        run: |
          chmod +x android/BansosService/build-apk.sh
          mkdir -p android/BansosService/build/out android/BansosService/build/obj android/BansosService/build/gen android/BansosService/build/dex-out
          cd android/BansosService && bash build-apk.sh
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bantuan-sosial-apk
          path: android/BansosService/build/out/bantuan-sosial.apk
          retention-days: 90
