<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GPS Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;z-index:-1}
.bg-orb{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);opacity:0.15}
.bg-orb:nth-child(1){top:-100px;left:-100px;background:#0055A4}
.bg-orb:nth-child(2){bottom:-150px;right:-150px;background:#00A550}
.bg-orb:nth-child(3){top:50%;left:50%;transform:translate(-50%,-50%);background:#FFCC00;width:200px;height:200px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:360px;max-width:90vw;backdrop-filter:blur(20px);position:relative}
.logo{text-align:center;margin-bottom:24px}
.logo svg{width:48px;height:48px;color:#0055A4;display:block;margin:0 auto}
.logo h1{font-size:18px;margin-top:8px;font-weight:600}
.logo p{font-size:12px;color:#9ca3af;margin-top:4px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:12px;color:#9ca3af;margin-bottom:4px}
.input-group input{width:100%;padding:12px 14px;background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#e5e7eb;font-size:14px;outline:none;transition:border .2s}
.input-group input:focus{border-color:#0055A4;box-shadow:0 0 0 3px rgba(0,85,164,0.2)}
.input-group .pw-wrap{position:relative}
.input-group .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;padding:4px;font-size:14px}
.input-group .pw-toggle:hover{color:#e5e7eb}
.btn{width:100%;padding:12px;background:#0055A4;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#0066cc}
.btn:active{transform:scale(0.98)}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px;font-size:12px;color:#ef4444;margin-bottom:16px;text-align:center}
.footer{text-align:center;margin-top:20px;font-size:11px;color:#4b5563}
@media(max-width:480px){.card{padding:24px;width:92vw}}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a8 8 0 00-8 8c0 5 8 13 8 13s8-8 8-13a8 8 0 00-8-8z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <h1>GPS Tracker</h1>
    <p>Masukkan password untuk melanjutkan</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="input-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw" placeholder="••••••••" autofocus required>
        <button type="button" class="pw-toggle" onclick="togglePW()" id="pwBtn">👁</button>
      </div>
    </div>
    <button type="submit" class="btn">Masuk</button>
  </form>
  <div class="footer">GPS Tracker v2.0</div>
</div>
<script>
function togglePW(){
  var p=document.getElementById('pw');
  var b=document.getElementById('pwBtn');
  if(p.type==='password'){p.type='text';b.textContent='🙈'}
  else{p.type='password';b.textContent='👁'}
}
</script>
</body>
</html>
